<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ames Housing Price Prediction</title>

    <style>

        body{
            background-color:#f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login{
            width: 60%;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
        }

        .mb-3{
            margin-bottom:15px;
        }

        label{
            font-weight:bold;
        }

        .form-control{
            width:100%;
            padding:10px;
            border-radius:5px;
            border:1px solid #ccc;
            margin-top:5px;
        }

        .btn{
            background-color:#007BFF;
            color:white;
            padding:12px;
            border:none;
            border-radius:5px;
            width:100%;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background-color:#0056b3;
        }

        h2{
            text-align:center;
            color:green;
        }

    </style>

</head>

<body>

    <div class="login">

        <h1>Ames Housing Price Prediction</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <h2><legend>Enter House Details</legend></h2>

            <!-- FIXED: safer naming alignment -->

            <div class="mb-3">
                <label>Overall Quality (1-10)</label>
                <input class="form-control" type="number" name="Overall Qual" required>
            </div>

            <div class="mb-3">
                <label>Gr Liv Area</label>
                <input class="form-control" type="number" name="Gr Liv Area" required>
            </div>

            <div class="mb-3">
                <label>Garage Area</label>
                <input class="form-control" type="number" name="Garage Area" required>
            </div>

            <div class="mb-3">
                <label>Total Basement SF</label>
                <input class="form-control" type="number" name="Total Bsmt SF" required>
            </div>

            <div class="mb-3">
                <label>Year Built</label>
                <input class="form-control" type="number" name="Year Built" required>
            </div>

            <div class="mb-3">
                <label>Fireplaces</label>
                <input class="form-control" type="number" name="Fireplaces" required>
            </div>

            <!-- CATEGORICAL FEATURES (UNCHANGED) -->

            <div class="mb-3">
                <label>MS Zoning</label>
                <input class="form-control" type="text" name="MS Zoning" required>
            </div>

            <div class="mb-3">
                <label>Neighborhood</label>
                <input class="form-control" type="text" name="Neighborhood" required>
            </div>

            <div class="mb-3">
                <label>House Style</label>
                <input class="form-control" type="text" name="House Style" required>
            </div>

            <div class="mb-3">
                <label>Exterior 1st</label>
                <input class="form-control" type="text" name="Exterior 1st" required>
            </div>

            <div class="mb-3">
                <label>Exter Qual</label>
                <input class="form-control" type="text" name="Exter Qual" required>
            </div>

            <div class="mb-3">
                <label>Foundation</label>
                <input class="form-control" type="text" name="Foundation" required>
            </div>

            <div class="mb-3">
                <label>Heating QC</label>
                <input class="form-control" type="text" name="Heating QC" required>
            </div>

            <div class="mb-3">
                <label>Kitchen Qual</label>
                <input class="form-control" type="text" name="Kitchen Qual" required>
            </div>

            <div class="mb-3">
                <label>Garage Type</label>
                <input class="form-control" type="text" name="Garage Type" required>
            </div>

            <div class="mb-3">
                <label>Sale Condition</label>
                <input class="form-control" type="text" name="Sale Condition" required>
            </div>

            <div class="mb-3">
                <input class="btn" type="submit" value="Predict House Price">
            </div>

        </form>

        <h2>Predicted House Price is {{ results }}</h2>

    </div>

</body>
</html>
