<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ames Housing Price Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Ames Housing Price Prediction</h2>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="row">

                <!-- Overall Qual -->

                <div class="col-md-6 mb-3">
                    <label class="form-label">Overall Quality</label>
                    <input type="number"
                           class="form-control"
                           name="Overall Qual"
                           min="1"
                           max="10"
                           required>
                </div>

                <!-- Overall Cond -->

                <div class="col-md-6 mb-3">
                    <label class="form-label">Overall Condition</label>
                    <input type="number"
                           class="form-control"
                           name="Overall Cond"
                           min="1"
                           max="10"
                           required>
                </div>

                <!-- Total Basement -->

                <div class="col-md-6 mb-3">
                    <label class="form-label">Total Basement SF</label>
                    <input type="number"
                           class="form-control"
                           name="Total Bsmt SF"
                           required>
                </div>

                <!-- First Floor -->

                <div class="col-md-6 mb-3">
                    <label class="form-label">1st Floor SF</label>
                    <input type="number"
                           class="form-control"
                           name="1st Flr SF"
                           required>
                </div>

                <!-- Ground Living Area -->

                <div class="col-md-6 mb-3">
                    <label class="form-label">Ground Living Area</label>
                    <input type="number"
                           class="form-control"
                           name="Gr Liv Area"
                           required>
                </div>

                <!-- Garage Area -->

                <div class="col-md-6 mb-3">
                    <label class="form-label">Garage Area</label>
                    <input type="number"
                           class="form-control"
                           name="Garage Area"
                           required>
                </div>

                <!-- MS Zoning -->

                <div class="col-md-6 mb-3">
                    <label class="form-label">MS Zoning</label>

                    <select class="form-select" name="MS Zoning" required>

                        <option value="">Select</option>
                        <option value="RL">RL</option>
                        <option value="RM">RM</option>
                        <option value="FV">FV</option>
                        <option value="RH">RH</option>
                        <option value="C (all)">C (all)</option>

                    </select>

                </div>

                <!-- Neighborhood -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">Neighborhood</label>

                    <select class="form-select" name="Neighborhood" required>

                        <option value="">Select</option>

                        <option value="NAmes">NAmes</option>
                        <option value="CollgCr">CollgCr</option>
                        <option value="OldTown">OldTown</option>
                        <option value="Edwards">Edwards</option>
                        <option value="Sawyer">Sawyer</option>
                        <option value="NridgHt">NridgHt</option>

                    </select>

                </div>

                <!-- House Style -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">House Style</label>

                    <select class="form-select" name="House Style" required>

                        <option value="">Select</option>

                        <option value="1Story">1Story</option>
                        <option value="2Story">2Story</option>
                        <option value="1.5Fin">1.5Fin</option>
                        <option value="SLvl">SLvl</option>

                    </select>

                </div>

                <!-- Heating QC -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">Heating QC</label>

                    <select class="form-select" name="Heating QC" required>

                        <option value="">Select</option>

                        <option value="Ex">Excellent</option>
                        <option value="Gd">Good</option>
                        <option value="TA">Typical</option>
                        <option value="Fa">Fair</option>
                        <option value="Po">Poor</option>

                    </select>

                </div>

                <!-- Central Air -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">Central Air</label>

                    <select class="form-select" name="Central Air" required>

                        <option value="">Select</option>

                        <option value="Y">Yes</option>
                        <option value="N">No</option>

                    </select>

                </div>

                <!-- Kitchen Qual -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">Kitchen Quality</label>

                    <select class="form-select" name="Kitchen Qual" required>

                        <option value="">Select</option>

                        <option value="Ex">Excellent</option>
                        <option value="Gd">Good</option>
                        <option value="TA">Typical</option>
                        <option value="Fa">Fair</option>
                        <option value="Po">Poor</option>

                    </select>

                </div>

                <!-- Garage Type -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">Garage Type</label>

                    <select class="form-select" name="Garage Type" required>

                        <option value="">Select</option>

                        <option value="Attchd">Attached</option>
                        <option value="Detchd">Detached</option>
                        <option value="BuiltIn">Built In</option>
                        <option value="Basment">Basement</option>
                        <option value="CarPort">CarPort</option>
                        <option value="2Types">2Types</option>

                    </select>

                </div>

                <!-- Sale Condition -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">Sale Condition</label>

                    <select class="form-select" name="Sale Condition" required>

                        <option value="">Select</option>

                        <option value="Normal">Normal</option>
                        <option value="Partial">Partial</option>
                        <option value="Abnorml">Abnormal</option>
                        <option value="Family">Family</option>
                        <option value="Alloca">Allocation</option>
                        <option value="AdjLand">AdjLand</option>

                    </select>

                </div>

            </div>

            <div class="d-grid">

                <button class="btn btn-primary btn-lg" type="submit">
                    Predict House Price
                </button>

            </div>

        </form>

        <br>

        {% if results %}
        <div class="alert alert-success text-center">
            <h4>Predicted House Price</h4>
            <h3>${{ results }}</h3>
        </div>
        {% endif %}

    </div>

</div>

</body>

</html>
