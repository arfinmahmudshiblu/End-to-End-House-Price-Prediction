<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Ames Housing Price Prediction
    </title>

    <!-- Bootstrap CSS -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body style="background-color:#f5f5f5;">

    <div class="container mt-5 mb-5">

        <div class="card shadow-lg p-4">

            <!-- ========================================= -->
            <!-- Heading -->
            <!-- ========================================= -->

            <h1 class="text-center text-primary mb-4">

                Ames Housing Price Prediction

            </h1>

            <!-- ========================================= -->
            <!-- Form -->
            <!-- ========================================= -->

            <form action="{{ url_for('predict_datapoint') }}"
                  method="post">

                <!-- ===================================== -->
                <!-- Numerical Features -->
                <!-- ===================================== -->

                <h3 class="mb-3 text-secondary">

                    Numerical Features

                </h3>

                <!-- Overall Quality -->

                <div class="mb-3">

                    <label class="form-label">

                        Overall Quality

                    </label>

                    <input type="number"
                           class="form-control"
                           name="Overall Qual"
                           placeholder="Enter Overall Quality (1-10)"
                           min="1"
                           max="10"
                           required>

                </div>

                <!-- Overall Condition -->

                <div class="mb-3">

                    <label class="form-label">

                        Overall Condition

                    </label>

                    <input type="number"
                           class="form-control"
                           name="Overall Cond"
                           placeholder="Enter Overall Condition (1-10)"
                           min="1"
                           max="10"
                           required>

                </div>

                <!-- Total Basement SF -->

                <div class="mb-3">

                    <label class="form-label">

                        Total Basement SF

                    </label>

                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="Total Bsmt SF"
                           placeholder="Enter Basement Area"
                           required>

                </div>

                <!-- 1st Floor SF -->

                <div class="mb-3">

                    <label class="form-label">

                        1st Floor SF

                    </label>

                    <input type="number"
                           class="form-control"
                           name="1st Flr SF"
                           placeholder="Enter 1st Floor Area"
                           required>

                </div>

                <!-- Ground Living Area -->

                <div class="mb-3">

                    <label class="form-label">

                        Ground Living Area

                    </label>

                    <input type="number"
                           class="form-control"
                           name="Gr Liv Area"
                           placeholder="Enter Living Area"
                           required>

                </div>

                <!-- Garage Area -->

                <div class="mb-3">

                    <label class="form-label">

                        Garage Area

                    </label>

                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="Garage Area"
                           placeholder="Enter Garage Area"
                           required>

                </div>

                <!-- ===================================== -->
                <!-- Categorical Features -->
                <!-- ===================================== -->

                <h3 class="mt-5 mb-3 text-secondary">

                    Categorical Features

                </h3>

                <!-- MS Zoning -->

                <div class="mb-3">

                    <label class="form-label">

                        MS Zoning

                    </label>

                    <select class="form-control"
                            name="MS Zoning"
                            required>

                        <option selected disabled value="">
                            Select MS Zoning
                        </option>

                        <option value="RL">RL</option>
                        <option value="RM">RM</option>
                        <option value="FV">FV</option>
                        <option value="RH">RH</option>
                        <option value="C (all)">C (all)</option>

                    </select>

                </div>

                <!-- Neighborhood -->

                <div class="mb-3">

                    <label class="form-label">

                        Neighborhood

                    </label>

                    <select class="form-control"
                            name="Neighborhood"
                            required>

                        <option selected disabled value="">
                            Select Neighborhood
                        </option>

                        <option value="CollgCr">CollgCr</option>
                        <option value="OldTown">OldTown</option>
                        <option value="Edwards">Edwards</option>
                        <option value="NAmes">NAmes</option>
                        <option value="NridgHt">NridgHt</option>
                        <option value="Sawyer">Sawyer</option>

                    </select>

                </div>

                <!-- House Style -->

                <div class="mb-3">

                    <label class="form-label">

                        House Style

                    </label>

                    <select class="form-control"
                            name="House Style"
                            required>

                        <option selected disabled value="">
                            Select House Style
                        </option>

                        <option value="1Story">1Story</option>
                        <option value="2Story">2Story</option>
                        <option value="1.5Fin">1.5Fin</option>
                        <option value="SLvl">SLvl</option>

                    </select>

                </div>

                <!-- Heating QC -->

                <div class="mb-3">

                    <label class="form-label">

                        Heating Quality

                    </label>

                    <select class="form-control"
                            name="Heating QC"
                            required>

                        <option selected disabled value="">
                            Select Heating QC
                        </option>

                        <option value="Ex">Excellent</option>
                        <option value="Gd">Good</option>
                        <option value="TA">Typical</option>
                        <option value="Fa">Fair</option>

                    </select>

                </div>

                <!-- Central Air -->

                <div class="mb-3">

                    <label class="form-label">

                        Central Air

                    </label>

                    <select class="form-control"
                            name="Central Air"
                            required>

                        <option selected disabled value="">
                            Select Central Air
                        </option>

                        <option value="Y">Yes</option>
                        <option value="N">No</option>

                    </select>

                </div>

                <!-- Kitchen Quality -->

                <div class="mb-3">

                    <label class="form-label">

                        Kitchen Quality

                    </label>

                    <select class="form-control"
                            name="Kitchen Qual"
                            required>

                        <option selected disabled value="">
                            Select Kitchen Quality
                        </option>

                        <option value="Ex">Excellent</option>
                        <option value="Gd">Good</option>
                        <option value="TA">Typical</option>
                        <option value="Fa">Fair</option>

                    </select>

                </div>

                <!-- Garage Type -->

                <div class="mb-3">

                    <label class="form-label">

                        Garage Type

                    </label>

                    <select class="form-control"
                            name="Garage Type"
                            required>

                        <option selected disabled value="">
                            Select Garage Type
                        </option>

                        <option value="Attchd">Attached</option>
                        <option value="Detchd">Detached</option>
                        <option value="BuiltIn">BuiltIn</option>
                        <option value="Basment">Basement</option>

                    </select>

                </div>

                <!-- Sale Condition -->

                <div class="mb-4">

                    <label class="form-label">

                        Sale Condition

                    </label>

                    <select class="form-control"
                            name="Sale Condition"
                            required>

                        <option selected disabled value="">
                            Select Sale Condition
                        </option>

                        <option value="Normal">Normal</option>
                        <option value="Partial">Partial</option>
                        <option value="Abnorml">Abnormal</option>
                        <option value="Family">Family</option>

                    </select>

                </div>

                <!-- ===================================== -->
                <!-- Submit Button -->
                <!-- ===================================== -->

                <div class="d-grid">

                    <button type="submit"
                            class="btn btn-primary btn-lg">

                        Predict House Price

                    </button>

                </div>

            </form>

            <!-- ========================================= -->
            <!-- Prediction Result -->
            <!-- ========================================= -->

            {% if results %}

            <div class="alert alert-success mt-5">

                <h2 class="text-center">

                    Predicted House Price:
                    $ {{ results }}

                </h2>

            </div>

            {% endif %}

            <!-- ========================================= -->
            <!-- SHAP Feature Importance -->
            <!-- ========================================= -->

            {% if shap_table %}

            <div class="mt-5">

                <h3 class="text-center text-secondary mb-3">

                    Top Feature Importance (SHAP)

                </h3>

                <div class="table-responsive">

                    {{ shap_table | safe }}

                </div>

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
